<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fórum</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">Save-Info<span>.</span></div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="openSearch()">🔍 Buscar</button>
    <button class="btn btn-primary" onclick="openNewPost()">+ Nova Publicação</button>
  </div>
</header>

<div class="layout">
  <aside>
    <div class="sidebar-section">
      <div class="sidebar-title">Categorias</div>
      <div id="cat-list"></div>
      <div class="add-cat-form" id="add-cat-form" style="display:none;">
        <input type="text" id="new-cat-input" placeholder="Nome da categoria..." maxlength="30" />
        <button class="btn btn-sm btn-primary" onclick="confirmAddCat()">+</button>
      </div>
      <button class="btn btn-outline btn-sm" style="margin-top:10px; width:100%;" onclick="toggleAddCat()">+ Categoria</button>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Info</div>
      <div style="font-size:13px; color:var(--text3); line-height:1.7;">
        <div id="info-posts">0 publicações</div>
        <div id="info-cats">0 categorias</div>
      </div>
    </div>
  </aside>

  <main>
    <div class="page-header">
      <div>
        <div class="page-title" id="page-title">Todas as Publicações</div>
        <div class="page-subtitle" id="page-subtitle">Bem-vindo ao fórum</div>
      </div>
    </div>

    <div class="sort-bar">
      <span style="font-size:12px; color:var(--text3);">Ordenar:</span>
      <button class="sort-btn active" data-sort="recent" onclick="setSort('recent')">Recentes</button>
      <button class="sort-btn" data-sort="oldest" onclick="setSort('oldest')">Mais antigos</button>
      <button class="sort-btn" data-sort="alpha" onclick="setSort('alpha')">A–Z</button>
    </div>

    <div id="posts-container"></div>
  </main>
</div>

<!-- New / Edit Post Modal -->
<div class="overlay" id="new-post-overlay" onclick="closeOnBg(event,'new-post-overlay')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="form-modal-title">Nova Publicação</div>
      <button class="modal-close" onclick="closeNewPost()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Título *</label>
        <input type="text" class="form-input" id="f-title" placeholder="Título da publicação..." />
      </div>
      <div class="form-group">
        <label class="form-label">Conteúdo *</label>
        <textarea class="form-textarea" id="f-body" placeholder="Escreva o conteúdo aqui..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Categoria</label>
        <select class="form-select" id="f-cat"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Autor</label>
        <input type="text" class="form-input" id="f-author" placeholder="Seu nome..." />
      </div>
      <div class="form-group">
        <div class="checkbox-row">
          <input type="checkbox" id="f-pin">
          <label for="f-pin">📌 Fixar esta publicação</label>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Mídia (opcional)</label>
        <div class="media-tabs">
          <button class="media-tab active" onclick="switchTab('none')">Nenhuma</button>
          <button class="media-tab" onclick="switchTab('img-url')">Imagem URL</button>
          <button class="media-tab" onclick="switchTab('img-upload')">Imagem Upload</button>
          <button class="media-tab" onclick="switchTab('video-url')">Vídeo URL</button>
          <button class="media-tab" onclick="switchTab('video-embed')">YouTube/Vimeo</button>
        </div>

        <div class="media-section active" id="tab-none"></div>

        <div class="media-section" id="tab-img-url">
          <div class="url-input-row">
            <input type="url" class="form-input" id="f-img-url" placeholder="https://..." oninput="previewImgUrl()" />
          </div>
          <div class="img-preview" id="img-url-preview" style="display:none;">
            <img id="img-url-thumb" src="" alt="" />
          </div>
        </div>

        <div class="media-section" id="tab-img-upload">
          <div class="upload-area" id="upload-area" onclick="document.getElementById('f-img-file').click()">
            <div style="font-size:28px; margin-bottom:6px;">🖼️</div>
            <div>Clique ou arraste uma imagem aqui</div>
            <div style="font-size:12px; margin-top:4px;">PNG, JPG, GIF, WEBP</div>
          </div>
          <input type="file" id="f-img-file" accept="image/*" style="display:none;" onchange="handleImgUpload()" />
          <div class="img-preview" id="img-upload-preview" style="display:none; margin-top:8px;">
            <img id="img-upload-thumb" src="" alt="" />
          </div>
        </div>

        <div class="media-section" id="tab-video-url">
          <input type="url" class="form-input" id="f-video-url" placeholder="URL do arquivo de vídeo (.mp4, .webm...)" />
        </div>

        <div class="media-section" id="tab-video-embed">
          <input type="url" class="form-input" id="f-video-embed" placeholder="URL do YouTube, Vimeo, etc..." />
          <div style="font-size:12px; color:var(--text3); margin-top:4px;">Cole o link normal ou o link de incorporação</div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeNewPost()">Cancelar</button>
      <button class="btn btn-primary" style="background:var(--accent); color:#fff;" onclick="submitPost()">Publicar</button>
    </div>
  </div>
</div>

<!-- Post View Modal -->
<div class="overlay" id="view-overlay" onclick="closeOnBg(event,'view-overlay')">
  <div class="modal" style="max-width:780px;">
    <div class="modal-header">
      <div class="modal-title" id="view-cat-tag" style="font-size:14px; font-family:'DM Sans'; font-weight:400; color:var(--text3);">Categoria</div>
      <div style="display:flex; gap:6px; align-items:center;">
        <button class="btn btn-sm btn-outline" id="view-edit-btn" onclick="editCurrentPost()">✏️ Editar</button>
        <button class="btn btn-sm btn-danger" id="view-del-btn" onclick="deleteCurrentPost()">🗑️ Excluir</button>
        <button class="modal-close" onclick="closeView()">×</button>
      </div>
    </div>
    <div id="view-content"></div>
    <div class="post-view-meta" id="view-meta"></div>
  </div>
</div>

<!-- Search Modal -->
<div class="overlay" id="search-overlay" onclick="closeOnBg(event,'search-overlay')">
  <div class="modal" style="max-width:540px;">
    <div class="modal-header">
      <div class="modal-title">Buscar</div>
      <button class="modal-close" onclick="closeSearch()">×</button>
    </div>
    <div class="modal-body">
      <input type="text" class="form-input" id="search-input" placeholder="Buscar publicações..." oninput="doSearch()" />
      <div id="search-results" style="margin-top:12px;"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
